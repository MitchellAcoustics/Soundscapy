        { "Advanced Visualization Techniques" = "tutorials/rendered/3_Advanced_Visualization_Techniques.md" },
        { "The Soundscape Perception Index (SPI)" = "tutorials/rendered/SoundscapePerceptionIndex-SPI.md" },
        { "Using Soundscapy for Binaural Recording Analysis" = "tutorials/rendered/BinauralAnalysis.md" },
        { "How To Analyse and Represent Soundscape Perception" = "tutorials/rendered/HowToAnalyseAndRepresentSoundscapes.md" },
    ] },
    { "API Reference" = [
        { "Overview" = "reference/index.md" },
        { "Soundscapy" = "reference/soundscapy.md" },
        { "Surveys" = "reference/surveys.md" },
        { "Plotting" = [
            "reference/plotting/plotting.md",
            { "Plot Functions" = "reference/plotting/plot_functions.md" },
            { "ISO Plot" = "reference/plotting/iso_plot.md" },
            { "Likert Plot" = "reference/plotting/likert.md" },
            { "Parameter Models" = "reference/plotting/param_models.md" },
            { "Parameter Defaults" = "reference/plotting/defaults.md" },
            { "Plotting Contexts" = "reference/plotting/plot_context.md" },
        ] },
        { "SPI" = "reference/spi.md" },
        { "SATP" = "reference/satp.md" },
        { "Audio Analysis" = [
            "reference/audio/index.md",
            { "Audio Analysis" = "reference/audio/audio_analysis.md" },
            { "Metrics" = "reference/audio/metrics.md" },
            { "Binaural" = "reference/audio/binaural.md" },
            { "Parallel Processing" = "reference/audio/parallel_processing.md" },
        ] },
        { "Internals" = [
            { "Overview" = "reference/internals/index.md" },
            { "Plotting Internals" = "reference/internals/plotting-internals.md" },
            { "R Internals" = "reference/internals/r-internals.md" },

name: Test

on:
  workflow_run:
    workflows: ["Linting"]
    types:
      - completed
    branches: [main, dev]
  workflow_call:
    outputs:
      tests-pass:
        description: "Indicates if all tests passed"
        value: ${{ github.event.inputs.tests-pass }}
  push:
    branches: [main, dev]
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"
    branches: [main, dev]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    if:
      ${{ github.event.workflow_run.conclusion == 'success' || github.event_name
      == 'pull_request' || github.event_name == 'push' }}
    name: Test with ${{ matrix.tasks }} on ${{ matrix.os }}

    outputs:
      tests-pass: ${{ steps.test-results.outputs.result }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        tasks: [test-base, test-audio, test-r, test-all]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: >-
            test-py313 test-py313-audio test-py313-r test-py313-all
          cache: true

      - name: Run tests
        id: test-results
        run: |
          pixi run ${{ matrix.tasks }} -n auto
          echo "result=true" >> $GITHUB_OUTPUT

---
name: Idea for improvement
description: Share an idea, even if it is rough
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Simple suggestions are welcome.
  - id: idea
    type: textarea
    attributes:
      label: What would you like to see?
      description: Describe the change you want.
  - id: why_helpful
    type: textarea
    attributes:
      label: Why would this help?
      description: Optional context about your workflow or use case.
  - id: additional
    type: textarea
    attributes:
      label: Extra details (optional)
      description: Links, mockups, examples, or anything else.

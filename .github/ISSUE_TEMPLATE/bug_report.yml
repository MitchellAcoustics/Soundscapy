---
name: Something is not working
description: Tell us what happened in plain language
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Short notes are completely fine.
  - id: what_happened
    type: textarea
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: I ran ... and got ...
  - id: expected
    type: textarea
    attributes:
      label: What did you expect instead?
      description: One or two lines is enough.
  - id: environment
    type: input
    attributes:
      label: Optional environment info
      description: For example Python version, Soundscapy version, and operating system.
      value: |-
        - Python version:
        - Soundscapy version:
        - Operating system:

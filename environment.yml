channels:
  - conda-forge
  - nodefaults
dependencies:
  - r-base >=4.4.3,<4.6
  - r-sn >=2.1.3
  - rpy2 >=3.5.0
  - python >=3.11,<3.15
  - pip
  - pip:
      - soundscapy[r,audio]>=0.8.1
variables:
  PYTHONIOENCODING: utf-8
  PYTHONNOUSERSITE: "1"
  PIXI_R_LIBS: $CONDA_PREFIX/lib/R/library
  PIXI_R_HOME: $CONDA_PREFIX/lib/R
  R_LIBS: $PIXI_R_LIBS
  R_LIBS_USER: $PIXI_R_LIBS
  R_HOME: $PIXI_R_HOME
